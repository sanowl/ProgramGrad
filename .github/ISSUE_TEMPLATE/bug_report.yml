name: Bug report
description: Report incorrect gradients, traces, fidelity metrics, or demo behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a ProgramGrad issue. Please include enough detail to reproduce the behavior.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: The soft_if gradient is inconsistent with finite differences when...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal code, command, or test case.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include trace output, gradients, or fidelity report if relevant.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13.0"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or notes about the surrogate mode.

